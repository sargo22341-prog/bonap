name: Bonap
description: Affichage du planning repas Mealie sur TRMNL
version: "1.0.0"
author: AymericLeFeyer
url: https://github.com/AymericLeFeyer/bonap

templates:
  - name: planning-3days
    file: planning-3days.html
    description: >
      Affiche les repas (déjeuner + dîner) sur les 3 prochains jours.
    data:
      endpoint: custom  # voir README
      schema:
        days:
          - label: string       # "Aujourd'hui", "Demain", nom du jour
            date: string        # "Ven. 28 mars"
            lunch: string|null  # nom de la recette ou null
            dinner: string|null
        last_update: string     # "28/03 10:30"

  - name: next-meal
    file: next-meal.html
    description: >
      Affiche le prochain repas (déjeuner 12h / dîner 20h) avec photo,
      ingrédients et premières étapes.
    data:
      endpoint: custom  # voir README
      schema:
        type: string        # "Déjeuner" ou "Dîner"
        at: string          # "12:00" ou "20:00"
        name: string        # nom de la recette
        image_url: string   # URL complète de l'image (auth déjà résolue)
        ingredients:
          - string          # ex: "200 g farine"
        instructions:
          - string          # ex: "Préchauffer le four à 200°C"
        last_update: string # "28/03 10:30"
