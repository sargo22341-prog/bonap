services:
  bonap:
    image: ghcr.io/votre-user/bonap:latest
    # Pour builder localement : remplacer la ligne image par :
    # build: .
    ports:
      - "3000:80"
    environment:
      # URL de Mealie accessible depuis le navigateur de l'utilisateur
      - VITE_MEALIE_URL=http://mon-mealie:9000
      # Token API Mealie (Mealie → Profil → API Tokens)
      - VITE_MEALIE_TOKEN=mon_token_api
      # Optionnel : URL interne pour le proxy nginx /api → Mealie
      # Par défaut, nginx utilisera VITE_MEALIE_URL
      # Utile si Mealie est sur un réseau Docker interne avec un nom différent
      # - MEALIE_INTERNAL_URL=http://mealie:9000
    restart: unless-stopped
