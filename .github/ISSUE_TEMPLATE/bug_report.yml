name: Bug report
description: Signaler un comportement inattendu
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Merci de remplir ce formulaire aussi précisément que possible.

  - type: input
    id: bonap-version
    attributes:
      label: Version de Bonap
      description: Tag de release ou commit (visible dans les paramètres ou `git log`)
      placeholder: "ex: v1.0.63"
    validations:
      required: true

  - type: input
    id: mealie-version
    attributes:
      label: Version de Mealie
      placeholder: "ex: v1.12.0"
    validations:
      required: true

  - type: dropdown
    id: install-method
    attributes:
      label: Méthode d'installation
      options:
        - Docker
        - Home Assistant addon
        - Dev local (npm run dev)
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Étapes pour reproduire
      placeholder: |
        1. Aller sur...
        2. Cliquer sur...
        3. Observer...
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Comportement attendu
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Comportement observé
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs / erreurs console (si disponibles)
      render: shell
