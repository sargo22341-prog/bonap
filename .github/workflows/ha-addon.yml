name: Build and publish Home Assistant addon

on:
  push:
    branches:
      - main
    paths:
      - "ha-addon/**"
      - "src/**"
      - "public/**"
      - "index.html"
      - "package.json"
      - "package-lock.json"
      - "vite.config.ts"
      - "tsconfig*.json"
  pull_request:
    branches:
      - main
    paths:
      - "ha-addon/**"

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    name: Build and push HA addon image (${{ matrix.arch }})
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    strategy:
      fail-fast: false
      matrix:
        include:
          - arch: amd64
            platform: linux/amd64
            build_from: alpine:3.20
          - arch: aarch64
            platform: linux/arm64
            build_from: alpine:3.20
          - arch: armv7
            platform: linux/arm/v7
            build_from: alpine:3.20

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Get addon version
        id: version
        run: echo "version=$(grep '^version:' ha-addon/bonap/config.yaml | tr -d '"' | awk '{print $2}')" >> $GITHUB_OUTPUT

      - name: Set up QEMU (for cross-arch builds)
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to the Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ha-addon/bonap/Dockerfile
          platforms: ${{ matrix.platform }}
          push: ${{ github.event_name != 'pull_request' }}
          tags: |
            ${{ env.REGISTRY }}/aymericlefeyer/bonap-ha-addon-${{ matrix.arch }}:${{ steps.version.outputs.version }}
            ${{ env.REGISTRY }}/aymericlefeyer/bonap-ha-addon-${{ matrix.arch }}:latest
          build-args: |
            BUILD_FROM=${{ matrix.build_from }}
          cache-from: type=gha,scope=ha-${{ matrix.arch }}
          cache-to: type=gha,mode=max,scope=ha-${{ matrix.arch }}
