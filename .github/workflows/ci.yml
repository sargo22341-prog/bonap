name: CI

on:
  pull_request:
    branches:
      - main

jobs:
  check:
    name: Lint & build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Build
        run: npm run build

  e2e:
    name: E2E tests (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 'lts/*'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Create .env for tests
        run: |
          echo "VITE_MEALIE_URL=http://localhost:9000" >> .env
          echo "VITE_MEALIE_TOKEN=fake-token-ci" >> .env

      - name: Start dev server
        run: npm run dev &
        env:
          VITE_MEALIE_URL: http://localhost:9000
          VITE_MEALIE_TOKEN: fake-token-ci

      - name: Wait for dev server to be ready
        run: npx wait-on http://localhost:5173 --timeout 60000

      - name: Run Playwright tests
        run: npm run test:e2e

      - name: Upload Playwright report on failure
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  docker:
    name: Docker build check
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (no push)
        uses: docker/build-push-action@v6
        with:
          context: .
          push: false
          tags: bonap:pr-${{ github.event.pull_request.number }}
