    <link rel="canonical" href="https://bonap.app/" />

    <!-- Open Graph -->
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://bonap.app/" />
    <meta property="og:site_name" content="Bonap" />
    <meta property="og:title" content="Bonap — L'app ultime de gestion des repas" />
    <meta property="og:description" content="Interface moderne pour Mealie : recettes, planning hebdomadaire, courses intelligentes et suggestions IA. Self-hosted, open-source. Dispo sur Docker et Home Assistant." />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Bonap — L'app ultime de gestion des repas" />
    <meta name="twitter:description" content="Interface moderne pour Mealie : recettes, planning, courses et suggestions IA. Self-hosted, open-source." />
    <meta name="twitter:image" content="https://bonap.app/logo_bonap.png" />

    <!-- Structured Data -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "Bonap",
      "applicationCategory": "LifestyleApplication",
      "operatingSystem": "Web, Docker, Home Assistant",
      "offers": { "@type": "Offer", "price": "0", "priceCurrency": "EUR" },
      "description": "Interface moderne et enrichie pour Mealie, le gestionnaire de recettes self-hosted. Planning de repas, liste de courses intelligente, suggestions et assistant IA.",
      "url": "https://bonap.app/",
      "license": "https://opensource.org/licenses/MIT",
      "codeRepository": "https://github.com/AymericLeFeyer/bonap",
      "author": { "@type": "Person", "name": "AymericLeFeyer" }
    }
    </script>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="/bonap.png" />

    <!-- Anti-flash theme : appliqué avant le rendu React -->
    <script>
      (function() {
        try {
          var stored = localStorage.getItem('bonap-website-theme')
          if (stored === 'light' || stored === 'dark') {
            document.documentElement.setAttribute('data-theme', stored)
          } else {
            var prefersDark = window.matchMedia('(prefers-color-scheme: dark)').matches
            document.documentElement.setAttribute('data-theme', prefersDark ? 'dark' : 'light')
          }
        } catch(e) {}
      })()
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
