services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    ports:
      - "9000:9000"
    volumes:
      - mealie-data:/app/data
    environment:
      - ALLOW_SIGNUP=false
      - BASE_URL=http://localhost:9000
      - TZ=Europe/Paris
    restart: unless-stopped

  bonap:
    image: ghcr.io/votre-user/bonap:latest
    # Pour builder localement : remplacer la ligne image par :
    # build: .
    ports:
      - "3000:80"
    environment:
      # URL de Mealie visible depuis le navigateur de l'utilisateur
      # (doit être accessible en dehors de Docker)
      - VITE_MEALIE_URL=http://localhost:9000
      # Token API Mealie — à renseigner après la première connexion à Mealie
      # (Mealie → Profil utilisateur → API Tokens)
      - VITE_MEALIE_TOKEN=
      # URL interne pour le proxy nginx : Mealie est joignable via son nom de service Docker
      - MEALIE_INTERNAL_URL=http://mealie:9000
    depends_on:
      - mealie
    restart: unless-stopped

volumes:
  mealie-data:
