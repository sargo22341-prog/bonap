services:
  mealie:
    image: ghcr.io/mealie-recipes/mealie:latest
    ports:
      - "9000:9000"
    volumes:
      - mealie-data:/app/data
    environment:
      - ALLOW_SIGNUP=false
      - BASE_URL=http://localhost:9000
      - TZ=Europe/Paris
    restart: unless-stopped

  bonap:
    image: ghcr.io/aymericlefeyer/bonap:latest
    # Pour builder localement : remplacer la ligne image par :
    # build: .
    ports:
      - "3000:80"
    environment:
      # URL de Mealie — nom du service Docker (accessible par nginx en interne)
      # En mode full stack, le navigateur passe toujours par le proxy nginx de Bonap
      - VITE_MEALIE_URL=http://mealie:9000
      # Token API Mealie — à renseigner après la première connexion à Mealie
      # (Mealie → Profil utilisateur → API Tokens)
      - VITE_MEALIE_TOKEN=
      # - VITE_THEME =  light | dark | system ( optional )
    depends_on:
      - mealie
    restart: unless-stopped

volumes:
  mealie-data:
